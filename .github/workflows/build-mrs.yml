name: Build MRS Rulesets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 1"    # 每周一 UTC 22:00（北京时间周二 06:00）
    # 每天:  "0 22 * * *"
    # 每月:  "0 22 1 * *"
  push:
    branches: [main]
    paths:
      - "ruleset-config.yml"
      - ".github/workflows/build-mrs.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 消除 Node.js 20 deprecation 警告

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      # ── 下载 mihomo 二进制 ────────────────────────────────────────────────
      - name: Download mihomo binary
        run: |
          LATEST=$(curl -sSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "mihomo latest: $LATEST"
          curl -sSL \
            "https://github.com/MetaCubeX/mihomo/releases/download/${LATEST}/mihomo-linux-amd64-${LATEST}.gz" \
            -o mihomo.gz
          gunzip mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      # ── 核心转换步骤 ──────────────────────────────────────────────────────
      # behavior 支持三种模式：
      #   domain → 只提取 DOMAIN/DOMAIN-SUFFIX/DOMAIN-KEYWORD → name.mrs
      #   ipcidr → 只提取 IP-CIDR/IP-CIDR6                   → name.mrs
      #   split  → 同时提取两类，从同一文件生成两个 MRS：
      #            name-domain.mrs + name-ip.mrs
      - name: Convert rulesets to MRS
        run: |
          mkdir -p ./mrs
          python3 << 'PYEOF'
          import yaml, subprocess, os, urllib.request, sys, re

          # ── 正则定义 ──────────────────────────────────────────────────────
          DOMAIN_RE  = re.compile(r"^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD),", re.I)
          IPCIDR_RE  = re.compile(r"^(IP-CIDR|IP-CIDR6),", re.I)

          def download(url):
              """下载并返回文本内容，失败返回 None"""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "curl/7.0"})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return resp.read().decode("utf-8")
              except Exception as e:
                  print(f"  ❌ 下载失败: {e}")
                  return None

          def parse_payload(raw):
              """
              解析 payload，返回 (domain行列表, ipcidr行列表, keyword行列表)
              转换规则：
                DOMAIN-SUFFIX,t.me          →  +.t.me
                DOMAIN,api.x.com            →  api.x.com
                DOMAIN-KEYWORD,github       →  单独收集（不能进 MRS）
                IP-CIDR,149.154.0.0/16,...  →  149.154.0.0/16（去前缀和 no-resolve）
              """
              lines = raw.splitlines()
              domain_lines, ip_lines, keyword_lines = [], [], []
              in_payload = False

              for line in lines:
                  s = line.strip()
                  if s == "payload:":
                      in_payload = True
                      continue
                  if not in_payload:
                      continue
                  if not s.startswith("-"):
                      continue
                  # 仅去掉前缀 "  - "，保留完整规则体
                  body = re.sub(r"^[\s-]+", "", s)

                  if body.upper().startswith("DOMAIN-KEYWORD,"):
                      # keyword 不能进 MRS，单独收集
                      keyword_lines.append(f"  - {body}")
                  elif DOMAIN_RE.match(body):
                      # mihomo domain behavior 的 payload 要求纯域名格式：
                      #   DOMAIN-SUFFIX,github.com  →  +.github.com
                      #   DOMAIN,github.com         →  github.com
                      if body.upper().startswith("DOMAIN-SUFFIX,"):
                          val = body.split(",", 1)[1]
                          domain_lines.append(f"  - +.{val}")
                      else:
                          # DOMAIN,xxx → 纯域名
                          val = body.split(",", 1)[1]
                          domain_lines.append(f"  - {val}")
                  elif IPCIDR_RE.match(body):
                      # mihomo ipcidr behavior 只接受纯 CIDR（如 109.239.140.0/24）
                      # 必须去掉 "IP-CIDR," / "IP-CIDR6," 前缀，否则转换输出空文件
                      ip_body = re.sub(r"^IP-CIDR6?,", "", body, flags=re.I)
                      ip_body = re.sub(r",no-resolve$", "", ip_body, flags=re.I).strip()
                      ip_lines.append(f"  - {ip_body}")

              # 去重（同一 CIDR 可能同时有带/不带 no-resolve 两行）
              domain_lines  = list(dict.fromkeys(domain_lines))
              ip_lines      = list(dict.fromkeys(ip_lines))
              keyword_lines = list(dict.fromkeys(keyword_lines))
              return domain_lines, ip_lines, keyword_lines

          def build_yaml(domain_or_ip_lines):
              """拼装成 mihomo 可识别的 payload YAML"""
              return "payload:\n" + "\n".join(domain_or_ip_lines) + "\n"

          def convert(input_file, output_file, behavior):
              """调用 mihomo convert-ruleset，成功返回文件大小，失败返回 None"""
              cmd = ["./mihomo", "convert-ruleset", behavior, "yaml", input_file, output_file]
              r = subprocess.run(cmd, capture_output=True, text=True)
              if r.returncode == 0:
                  return os.path.getsize(output_file)
              else:
                  print(f"  ❌ convert-ruleset 失败: {r.stderr.strip()}")
                  return None

          # ── 主流程 ────────────────────────────────────────────────────────
          with open("ruleset-config.yml", "r") as f:
              config = yaml.safe_load(f)

          rulesets = config.get("rulesets", [])
          success, fail = 0, 0

          for rule in rulesets:
              name     = rule["name"]
              behavior = rule["behavior"]
              url      = rule["url"]

              print(f"\n{'─'*55}")
              print(f"[{name}]  behavior={behavior}")
              print(f"  {url}")

              # 下载
              raw = download(url)
              if raw is None:
                  fail += 1
                  continue

              total = raw.count("\n  - ")
              print(f"  ✅ {len(raw)} bytes，约 {total} 条规则")

              # 解析 payload
              domain_lines, ip_lines, keyword_lines = parse_payload(raw)
              print(f"  解析: {len(domain_lines)} 条 domain，{len(ip_lines)} 条 ipcidr，{len(keyword_lines)} 条 keyword")

              if behavior == "domain":
                  # ── 只要 domain ───────────────────────────────────────────────
                  if not domain_lines:
                      print("  ⚠️  没有 domain 行，跳过")
                      fail += 1
                      continue
                  tmp = f"/tmp/{name}.yaml"
                  with open(tmp, "w") as f:
                      f.write(build_yaml(domain_lines))
                  size = convert(tmp, f"./mrs/{name}.mrs", "domain")
                  if size:
                      print(f"  ✅ {name}.mrs ({size} bytes)")
                      success += 1
                  else:
                      fail += 1
                  # keyword 写 classical YAML
                  if keyword_lines:
                      kw_path = f"./mrs/{name}-keyword.yaml"
                      with open(kw_path, "w") as f:
                          f.write(build_yaml(keyword_lines))
                      print(f"  ✅ {name}-keyword.yaml ({len(keyword_lines)} 条 keyword)")

              elif behavior == "ipcidr":
                  # ── 只要 ipcidr ──────────────────────────────────────────
                  if not ip_lines:
                      print("  ⚠️  没有 ipcidr 行，跳过")
                      fail += 1
                      continue
                  tmp = f"/tmp/{name}.yaml"
                  with open(tmp, "w") as f:
                      f.write(build_yaml(ip_lines))
                  size = convert(tmp, f"./mrs/{name}.mrs", "ipcidr")
                  if size:
                      print(f"  ✅ {name}.mrs ({size} bytes)")
                      success += 1
                  else:
                      fail += 1

              elif behavior == "split":
                  # ── 同时生成 domain + ipcidr 两个 MRS ───────────────────
                  any_ok = False

                  if domain_lines:
                      tmp = f"/tmp/{name}-domain.yaml"
                      with open(tmp, "w") as f:
                          f.write(build_yaml(domain_lines))
                      size = convert(tmp, f"./mrs/{name}-domain.mrs", "domain")
                      if size:
                          print(f"  ✅ {name}-domain.mrs ({size} bytes)")
                          any_ok = True
                      else:
                          fail += 1
                  else:
                      print(f"  ⚠️  {name}: 无 domain 行，跳过 domain 部分")

                  if ip_lines:
                      tmp = f"/tmp/{name}-ip.yaml"
                      with open(tmp, "w") as f:
                          f.write(build_yaml(ip_lines))
                      size = convert(tmp, f"./mrs/{name}-ip.mrs", "ipcidr")
                      if size:
                          print(f"  ✅ {name}-ip.mrs ({size} bytes)")
                          any_ok = True
                      else:
                          fail += 1
                  else:
                      print(f"  ⚠️  {name}: 无 ipcidr 行，跳过 ip 部分")

                  # keyword 写 classical YAML
                  if keyword_lines:
                      kw_path = f"./mrs/{name}-keyword.yaml"
                      with open(kw_path, "w") as f:
                          f.write(build_yaml(keyword_lines))
                      print(f"  ✅ {name}-keyword.yaml ({len(keyword_lines)} 条 keyword)")
                      any_ok = True

                  if any_ok:
                      success += 1
                  else:
                      fail += 1

              else:
                  print(f"  ⚠️  未知 behavior: {behavior}，跳过")
                  fail += 1

          print(f"\n{'='*55}")
          print(f"完成: {success} 成功 / {fail} 失败")
          print(f"{'='*55}")
          if success == 0:
              print("❌ 没有任何规则转换成功，终止")
              sys.exit(1)
          elif fail > 0:
              print(f"⚠️  {fail} 个规则失败，但 {success} 个成功，继续生成产物")
          PYEOF

      # ── 生成清单 + rule-providers 配置片段 ──────────────────────────────
      - name: Generate manifest and config snippet
        run: |
          REPO="${{ github.repository }}"
          BUILD_TIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')
          python3 << PYEOF
          import yaml, os, json

          with open("ruleset-config.yml", "r") as f:
              config = yaml.safe_load(f)

          rulesets = config.get("rulesets", [])
          repo       = "$REPO"
          build_time = "$BUILD_TIME"

          # ── 扫描实际生成的 .mrs 文件 ─────────────────────────────────────
          mrs_files = sorted(f for f in os.listdir("./mrs") if f.endswith(".mrs"))

          # manifest.json
          manifest = {"build_time": build_time, "repo": repo, "files": []}
          for fname in mrs_files:
              size = os.path.getsize(f"./mrs/{fname}")
              manifest["files"].append({
                  "file": fname,
                  "size_bytes": size,
                  "url": f"https://github.com/{repo}/raw/mrs/{fname}"
              })
          with open("./mrs/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)

          # ── rule-providers 配置片段 ───────────────────────────────────────
          # 直连/拒绝策略白名单（剩余统一走 Proxy）
          DIRECT_NAMES = {"Lan", "Lan-domain", "Lan-ip", "cn"}
          REJECT_NAMES = {"ads"}

          snippet  = f"# 自动生成 buildtime={build_time}  repo={repo}\n"
          snippet += "# 将以下内容合并到你的 clash-verge-rev 配置中\n\n"
          snippet += "rule-providers:\n"

          for fname in mrs_files:
              nm   = fname.replace(".mrs", "")
              # 判断 behavior
              if nm.endswith("-domain"):
                  bh = "domain"
              elif nm.endswith("-ip"):
                  bh = "ipcidr"
              else:
                  # 从配置中查找原始 behavior
                  rule = next((r for r in rulesets if r["name"] == nm), {})
                  bh = rule.get("behavior", "domain")
                  if bh == "split":
                      bh = "domain"   # 不应该出现，保底

              snippet += f"\n  {nm}:\n"
              snippet += f"    type: http\n"
              snippet += f"    behavior: {bh}\n"
              snippet += f"    format: mrs\n"
              snippet += f"    url: \"https://github.com/{repo}/raw/mrs/{fname}\"\n"
              snippet += f"    path: ./providers/{fname}\n"
              snippet += f"    interval: 86400\n"

          snippet += "\n\nrules:\n"
          for fname in mrs_files:
              nm = fname.replace(".mrs", "")
              if nm in DIRECT_NAMES:
                  policy = "DIRECT"
              elif nm in REJECT_NAMES:
                  policy = "REJECT"
              else:
                  policy = "Proxy"
              snippet += f"  - RULE-SET,{nm},{policy}\n"
          snippet += "  - MATCH,DIRECT\n"

          with open("./mrs/rule-providers-snippet.yaml", "w", encoding="utf-8") as f:
              f.write(snippet)

          print(f"清单生成完毕: {len(mrs_files)} 个 MRS 文件")
          for f in mrs_files:
              print(f"  {f}")
          PYEOF

      # ── 推送到 mrs 分支 ──────────────────────────────────────────────────
      - name: Push to mrs branch
        run: |
          BUILD_TIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')
          cd mrs
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b mrs
          git add .
          git commit -m "Auto build MRS - $BUILD_TIME"
          git remote add origin \
            "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin mrs
          echo "✅ 推送到 mrs 分支成功"
          ls -lh *.mrs

      # ── 上传 Artifacts ───────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: mrs-rulesets-${{ github.run_number }}
          path: ./mrs/
          retention-days: 7

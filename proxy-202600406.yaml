# ==================== Clash Verge 完整配置 ====================
mode: rule
log-level: info
ipv6: false
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
unified-delay: true

# 不加载 geosite/geoip，完全使用 rule-providers 实现分流
geodata-mode: false

# ==================== TUN 配置 ====================
tun:
  enable: true
  stack: system
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# ==================== DNS 配置 ====================
dns:
  enable: true
  listen: :53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "time.windows.com"
    - "time.ntp.org"
    - "+.stun.*.*"
    - "stun.*.*.*"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
  use-system-hosts: true
  use-hosts: true

  # 用于解析 DoH 服务器域名本身
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 节点地址解析，防止 DNS 回环
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 默认 DNS：所有未命中 nameserver-policy 的域名走国内 DNS
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  # ── DNS 分流：只命中国外服务，其余全走 nameserver（国内）──────
  nameserver-policy:
    "rule-set:OpenAI,rule-set:Anthropic,rule-set:Gemini,rule-set:Claude,rule-set:Copilot,rule-set:Bing,rule-set:GitHub,rule-set:GoogleFCM,rule-set:Telegram-domain,rule-set:YouTube,rule-set:Twitter,rule-set:Google-domain,rule-set:Microsoft-domain,rule-set:GlobalProxy-domain":
      - https://dns.google/dns-query
      - https://1.1.1.1/dns-query



  - name: auto
    type: url-test
    proxies:
      - racknerd-anytls
      - racknerd-hysteria2
      - racknerd-VLESS-WS-TLS      
      - amd1-anytls
      - amd1-hysteria2
      - amd1-VLESS-WS-TLS
      - amd2-anytls
      - amd2-hysteria2
      - amd2-VLESS-WS-TLS
      - bitsflow-1-anytls
      - bitsflow-1-hysteria2
      - bitsflow-1-VLESS-WS-TLS
      - bitsflow-jp-anytls
      - bitsflow-jp-hysteria2
      - bitsflow-jp-VLESS-WS-TLS
      - massivegrid-anytls
      - massivegrid-hysteria2
      - euserv-vless-ws
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    lazy: true

# ==================== rule-providers ====================
# MRS 文件来自 https://github.com/hutufeng/rule.Clash/tree/mrs
# split 模式生成两个文件（-domain.mrs 和 -ip.mrs）
# domain 模式生成单个 .mrs 文件
# China / Apple / ProxyLite 暂无 MRS，使用 blackmatrix7 YAML

rule-providers:

  # ── Lan（split → 两个 MRS）─────────────────────────────
  Lan-domain:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/hutufeng/rule.Clash/mrs/Lan-domain.mrs"
    path: ./providers/Lan-domain.mrs
    interval: 604800

  Lan-ip:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://raw.githubusercontent.com/hutufeng/rule.Clash/mrs/Lan-ip.mrs"
    path: ./providers/Lan-ip.mrs
    interval: 604800

